<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood type x Element</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-images"></div>
    <div class="container">
        <div id="start-container">
            <h1>Blood type<br>x<br>Element</h1>
            <p class="subtitle">あなたの<br>血液型エレメントは？</p>
            <label for="bloodtype">血液型を選択してください</label>
            <select id="bloodtype">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="O">O</option>
                <option value="AB">AB</option>
            </select>
            <button id="start-button">診断を始める</button>
        </div>

        <div id="question-container" style="display: none;">
            <button id="back-button" style="display: none;">← 戻る</button>
            <div id="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <p id="question-text"></p>
            <div id="choices-container"></div>
        </div>
    </div>
    <script src="script.js"></script>

    <!-- 結果表示モーダル -->
    <div id="result-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <p id="result-type"></p>
            <img id="result-image" src="https://via.placeholder.com/150" alt="Result Image" style="max-width:50%; height:auto; display:block; margin: 10px auto;">
            <h2 id="result-title"></h2>
            <p id="result-keywords"></p>
            <p id="result-description"></p>
            <p id="result-strengths"></p>
                        <p id="result-challenges"></p>
            <p id="result-compatibility"></p>
            <button id="share-button">結果をシェアする</button>
        </div>
    </div>

    <!-- シェア画像プレビュー用のコンテナ -->
    <div id="canvas-preview-container">
        <p>シェア画像プレビュー</p>
    </div>
</body>
</html>
